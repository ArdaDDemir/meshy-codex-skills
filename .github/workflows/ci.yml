name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall plugins scripts tests

      - name: Project checks
        run: python scripts/check_project.py

      - name: MCP tool schema smoke test
        run: python plugins/meshy-prompt-studio/mcp/meshy_mcp_server.py --print-tools

      - name: Run tests
        run: python -m unittest discover tests

      - name: Package plugin
        run: python scripts/package_plugin.py

      - name: Upload plugin package artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshy-prompt-studio-${{ matrix.python-version }}
          path: dist/meshy-prompt-studio-*.zip

  release:
    name: Upload release package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Package plugin
        run: python scripts/package_plugin.py

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/meshy-prompt-studio-*.zip --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/meshy-prompt-studio-*.zip \
              --title "Meshy Prompt Studio ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
